name: BRAIN Alpha Search

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:
    inputs:
      start_idx:
        description: "시작 인덱스"
        default: "0"
      end_idx:
        description: "끝 인덱스"
        default: "60"

jobs:
  alpha-search:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests pandas

      - name: 알파 탐색 실행
        env:
          BRAIN_EMAIL:    ${{ secrets.BRAIN_EMAIL }}
          BRAIN_PASSWORD: ${{ secrets.BRAIN_PASSWORD }}
          START_IDX: ${{ github.event.inputs.start_idx || '0' }}
          END_IDX:   ${{ github.event.inputs.end_idx || '60' }}
        run: python alpha_search.py

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: alpha-results-${{ github.event.inputs.start_idx || '0' }}
          path: results/